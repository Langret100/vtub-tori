<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>실시간 톡</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }
    .messenger-shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #f4f6fb;
    }
    .messenger-topbar {
      height: 50px; /* 기존 72px 대비 약 -30% */
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      box-shadow: 0 1px 0 rgba(15,23,42,0.04);
      position: relative;
      z-index: 2;
    }
    .messenger-topbar-logo {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .messenger-topbar-logo img {
      height: 68px; /* 로고만 더 크게 (상단바 높이는 유지) */
      max-height: 100%;
      width: auto;
    }
    .messenger-topbar-close {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      font-size: 18px;
      cursor: pointer;
      color: #4b5563;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .messenger-topbar-close:active {
      background: transparent;
    }
    
    /* ===== 상단바: 현재 대화방 버튼(왼쪽) ===== */
    .messenger-topbar-roombtn{
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      max-width: min(44vw, 260px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

      display: inline-flex;
      align-items: center;
      gap: 6px;

      border: 1px solid rgba(0,0,0,0.10);
      background: #f3f4f6;
      color: #111827;
      border-radius: 12px; /* 각이 조금 둥근 네모 */
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.2px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .messenger-topbar-roombtn::after{
      content: "▾";
      font-size: 12px;
      opacity: 0.7;
      flex: 0 0 auto;
    }
    .messenger-topbar-roombtn:active{
      background: #e5e7eb;
    }

    /* ===== 대화방 패널 열림 시 뒤 배경(클릭하면 닫힘) ===== */
    .room-backdrop{
      position: fixed;
      left: 0;
      right: 0;
      top: 50px; /* topbar 높이 */
      bottom: 0;
      background: rgba(15,23,42,0.18);
      display: none;
      z-index: 45;
    }
    .room-backdrop.open{ display:block; }
.messenger-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 8px;
      background: linear-gradient(to bottom, #f4f6fb, #e6ecff);
    }
    .date-separator {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 8px 0;
      font-size: 11px;
      color: #9ca3af;
    }
    .date-separator::before,
    .date-separator::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(148,163,184,0.5);
      margin: 0 6px;
    }
    .date-separator span {
      white-space: nowrap;
    }
    .msg-row {
      width: 100%;
      margin: 4px 0;
      display: flex;
    }
    .msg-row.me {
      justify-content: flex-end;
    }
    .msg-row.other {
      justify-content: flex-start;
    }
    .msg-inner {
      max-width: 78%;
      display: inline-flex;
      align-items: flex-end;
      gap: 4px;
    }
    .bubble {
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
      word-break: break-word;
      background: #e5e7eb;
      color: #111827;
    }
    /* 사진 메시지 버블 */
    .bubble.photo-bubble {
      padding: 6px;
      background: #ffffff;
    }
    .msg-row.me .bubble.photo-bubble {
      background: rgba(37, 99, 235, 0.10);
    }
    .chat-photo {
      display: block;
      width: 180px;
      max-width: min(56vw, 240px);
      height: auto;
      border-radius: 14px;
      box-shadow: 0 10px 20px rgba(15,23,42,0.12);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .bubble.emoji-only {
      background: transparent !important;
      padding: 0 !important;
      border-radius: 0 !important;
    }
    .msg-row.me .bubble.emoji-only,
    .msg-row.other .bubble.emoji-only {
      background: transparent !important;
    }
    .msg-row.me .bubble {
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-row.other .bubble {
      background: #ffffff;
      color: #111827;
      border-bottom-left-radius: 4px;
    }
    /* 캐릭터 자동답변 말풍선 */
    .msg-row.char-reply .bubble.char-reply-bubble {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      color: #92400e;
      border: 1.5px solid #fbbf24;
      border-bottom-left-radius: 4px;
    }
    .msg-row.char-reply .sender-name {
      color: #d97706;
      font-weight: 700;
    }
    .msg-meta {
      font-size: 11px;
      color: #6b7280;
      white-space: nowrap;
      margin-bottom: 2px;
    }
    .msg-row.me .msg-meta {
      /* 내 메시지는 시간표시가 말풍선 반대쪽(좌측)에 오므로, 좌측 정렬 */
      text-align: left;
    }
    .msg-row.other .msg-meta {
      text-align: left;
    }
    .empty-hint {
      margin-top: 24px;
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
    }
    .messenger-input-bar {
      padding: 8px 10px 12px;
      background: #f9fafb;
      box-shadow: 0 -1px 0 rgba(15,23,42,0.04);
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 2;
    }
    .msg-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      background: #e5edff;
      gap: 6px;
    }
    .msg-emoji-btn {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: none;
      background: rgba(148,163,184,0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
    }
    .msg-camera-btn {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: none;
      background: rgba(148,163,184,0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
    }
    .msg-emoji-btn:active {
      background: rgba(148,163,184,0.5);
    }
    .msg-camera-btn:active {
      background: rgba(148,163,184,0.5);
    }

    /* =========================================================
       [버튼 꾹 누름(롱프레스) 방지]
       - 입력창 주변(😊, +, 보내기) 및 첨부/이모티콘 패널 버튼을
         꾹 눌렀을 때 파란 하이라이트/컨텍스트 메뉴가 뜨는 현상 방지
       - 클릭/탭 기능은 유지
       ========================================================= */
    .messenger-input-bar button,
    .msg-attach-menu button,
    .msg-emoji-panel button {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      outline: none;
      touch-action: manipulation;
    }
    .messenger-input-bar button:focus,
    .msg-attach-menu button:focus,
    .msg-emoji-panel button:focus {
      outline: none;
    }


    /* =========================================================
       [+ 첨부 메뉴]
       - + 버튼을 누르면(사진촬영/이미지/파일) 3개 메뉴를 표시
       - social-messenger.js 가 DOM을 생성하고, 여기 CSS가 모양을 담당
       ========================================================= */
    .msg-attach-menu{
      position:absolute;
      left: 46px; /* 😊 버튼 + 여백 기준(대략) */
      bottom: 52px;
      width: 160px;
      background:#ffffff;
      border: 1px solid rgba(148,163,184,0.45);
      border-radius: 14px;
      box-shadow: 0 16px 40px rgba(15,23,42,0.18);
      padding: 6px;
      display:none;
      z-index: 25;
    }
    .msg-attach-menu.open{ display:block; }
    .msg-attach-item{
      width:100%;
      border:0;
      background:transparent;
      padding: 10px 10px;
      text-align:left;
      font-size: 13px;
      color:#111827;
      border-radius: 12px;
      cursor:pointer;
    }
    .msg-attach-item:active{
      background: rgba(37,99,235,0.10);
    }

    /* 파일 메시지(링크) */
    .file-bubble{
      background:#ffffff;
      color:#111827;
    }
    .msg-row.me .file-bubble{
      background: rgba(37, 99, 235, 0.10);
      color:#111827;
    }
    .file-link{
      color: inherit;
      text-decoration: underline;
      word-break: break-all;
    }
    .msg-input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: #111827;
    }
    .msg-input::placeholder {
      color: #9ca3af;
    }
    .send-btn {
      flex: 0 0 auto;
      border: none;
      border-radius: 999px;
      padding: 0 20px;
      height: 36px;
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.35);
    }
    .send-btn:active {
      transform: translateY(1px);
      box-shadow: 0 3px 8px rgba(37, 99, 235, 0.35);
    }
    
.msg-emoji-panel {
  position: absolute;
  left: 10px;
  bottom: 60px;

  /* 실시간 톡 보기 화면(라이트 톤)에 맞춘 이모티콘 패널 */
  width: 340px;
  max-width: min(340px, 92vw);
  background: rgba(244,246,251,0.98);
  border-radius: 16px;
  border: 1px solid rgba(148,163,184,0.45);
  box-shadow: 0 16px 40px rgba(15,23,42,0.22);

  /* 좌/우 동일 여백 확보 */
  padding: 10px;
  display: none;
  z-index: 20;

  /* 화면이 작은 환경에서 잘리지 않도록 */
  max-height: min(320px, calc(100vh - 160px));
  overflow: auto;
}
.msg-emoji-panel.open {
  display: block;
}
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  justify-content: stretch;
}
.emoji-item {
  width: 100%;
  aspect-ratio: 1 / 1;
  height: auto;
  border-radius: 12px;
  border: none;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.emoji-item:active {
  background: rgba(37,99,235,0.14);
}
.chat-emoji {
  width: 100%;
  height: 100%;
  max-width: 72px;
  max-height: 72px;
  object-fit: contain;
  pointer-events: none;
}
    .msg-status {
      position: absolute;
      left: 50%;
      bottom: 56px;
      transform: translateX(-50%);
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.86);
      color: #f9fafb;
      font-size: 11px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease-out;
      z-index: 30;
    }
    .msg-status.show {
      opacity: 1;
    }

    /* =========================================================
       [이미지 확대 보기]
       - 채팅 메시지 내 img.chat-photo 또는 [data-zoomable="1"] 클릭 시
         전체 화면으로 확대
       - 다시 누르면(오버레이 클릭) 원래대로
       ========================================================= */
    body.no-scroll {
      overflow: hidden;
    }
    .img-zoom-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.86);
      z-index: 9999;
      -webkit-tap-highlight-color: transparent;
    }
    .img-zoom-overlay.open {
      display: flex;
    }
    .img-zoom-overlay img {
      max-width: 92vw;
      max-height: 92vh;
      width: auto;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }
  
    /* ===== 대화방 ===== */
    .messenger-main {
      display: flex;
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    .room-panel {
      width: 240px;
      max-width: 78vw;
      min-width: 200px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      min-height: 0;

      /* 기본: 숨김(채팅창을 넓게) */
      position: fixed;
      left: 0;
      top: 50px;   /* topbar 높이 */
      bottom: 0;
      transform: translateX(-110%);
      transition: transform 0.18s ease-out;
      box-shadow: 16px 0 36px rgba(15,23,42,0.18);
      z-index: 50;
      border-right: 1px solid rgba(0,0,0,0.06);
    }
    .room-panel.open {
      transform: translateX(0);
    }
    .room-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 10px 8px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .room-panel-title {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.2px;
    }
    .room-add-btn {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.08);
      background: #f3f4f6;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .room-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    /* ── 대화방 목록 아이템 (chat-rooms.js 생성 클래스 포함) ── */
    .room-item {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(0,0,0,0.08);
      background: #ffffff;
      border-radius: 14px;
      padding: 10px 10px;
      cursor: pointer;
      /* 아이콘 + 텍스트 가로 배치 */
      display: flex;
      align-items: center;
      gap: 10px;
      /* 미확인 배지 기준 */
      position: relative;
      padding-right: 38px;
    }
    .room-item.active {
      border-color: rgba(0,0,0,0.18);
      background: #f8fafc;
    }
    /* 방 아이콘 박스 */
    .room-item-icon {
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: #e0e7ff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 22px;
    }
    .room-item-icon.room-icon-grid-1 .room-icon-avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      object-fit: cover;
    }
    .room-item-icon.room-icon-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }
    .room-item-icon.room-icon-grid-2 .room-icon-avatar {
      width: 100%;
      height: 44px;
      object-fit: cover;
    }
    .room-item-icon.room-icon-grid-4 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
    }
    .room-item-icon.room-icon-grid-4 .room-icon-avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .room-icon-avatar {
      display: block;
      background: #c7d2fe;
    }
    /* 방 이름/메타 래퍼 */
    .room-item-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .room-name {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
      line-height: 1.2;
      word-break: break-word;
    }
    .room-meta {
      margin-top: 2px;
      font-size: 11px;
      color: #6b7280;
    }

    /* 방별 미확인(새 글) 표시: 오른쪽 위 점 */
    .room-unread-badge{
      position:absolute;
      top: 12px;
      right: 12px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ef4444;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.95);
      display: none;
    }
    .room-unread-badge.show{ display:block; }

    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    /* 작은 화면: 방 목록 폭을 줄이고, 필요시 스크롤 */
    @media (max-width: 520px) {
      .room-panel { width: 220px; min-width: 180px; }
    }

  
    /* =========================================================
       [채팅 링크/유튜브 미리보기/QR 스캔]
       ========================================================= */
    .msg-link{
      color:#2563eb;
      text-decoration: underline;
      word-break: break-all;
    }
    .msg-link:active{ opacity: 0.8; }

    .yt-preview{
      display:flex;
      gap:10px;
      margin-top:8px;
      padding:8px;
      border:1px solid rgba(148,163,184,0.45);
      border-radius:12px;
      background:#ffffff;
      text-decoration:none;
      color:inherit;
    }
    .msg-row.me .yt-preview{
      background: rgba(37, 99, 235, 0.06);
    }
    .yt-thumb{
      width:96px;
      height:54px;
      object-fit:cover;
      border-radius:10px;
      flex:0 0 auto;
      background:#e5e7eb;
    }
    .yt-info{
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-width:0;
    }
    .yt-title{
      font-size:13px;
      font-weight:700;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .yt-host{
      font-size:12px;
      color:#6b7280;
      margin-top:4px;
    }

    .qr-scan-overlay{
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 18px;
    }
    .qr-scan-overlay.open{ display:flex; }
    .qr-scan-box{
      width: min(360px, 100%);
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(15,23,42,0.25);
      overflow: hidden;
    }
    .qr-scan-header{
      padding: 12px 14px;
      font-weight: 800;
      border-bottom: 1px solid rgba(148,163,184,0.35);
    }
    .qr-scan-video{
      width: 100%;
      height: 260px;
      background: #0b1220;
      object-fit: cover;
    }
    .qr-scan-hint{
      padding: 10px 14px;
      font-size: 13px;
      color: #334155;
    }
    .qr-scan-cancel{
      width: calc(100% - 28px);
      margin: 0 14px 14px;
      height: 40px;
      border: none;
      border-radius: 12px;
      background: rgba(37,99,235,0.12);
      color: #1d4ed8;
      font-weight: 800;
      cursor: pointer;
    }

      .zoom-open-link{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:#fff;text-decoration:underline;font-size:14px;opacity:.85;display:none;z-index:10000;}
    .img-zoom-overlay.open .zoom-open-link{display:block;}

    /* =========================================================
       [채팅 메시지 아바타 + 발신자 이름 - social-messenger.js]
       ========================================================= */
    .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      background: #e0e7ff;
      display: block;
      flex: 0 0 auto;
    }
    .msg-sender-name {
      font-size: 11px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 2px;
      padding-left: 2px;
    }

    /* ══════════════════════════════════════════════════════════
       방송방 에어로(Aero) 테마 — body.ae-mode 클래스 기준
       블루 글래스모피즘으로 메인 UI와 통일
       ══════════════════════════════════════════════════════════ */

    /* 스크롤바 — 방송방 모드 */
    body.ae-mode ::-webkit-scrollbar { width: 6px; }
    body.ae-mode ::-webkit-scrollbar-track { background: transparent; }
    body.ae-mode ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(100,190,255,0.55), rgba(60,140,240,0.4));
      border-radius: 999px;
    }

    /* 전체 쉘 */
    body.ae-mode .messenger-shell {
      background: rgba(8, 28, 64, 0.55);
      backdrop-filter: blur(32px) saturate(1.6);
    }

    /* 상단바 */
    body.ae-mode .messenger-topbar {
      background: rgba(5, 20, 55, 0.72);
      box-shadow: 0 1px 0 rgba(100,190,255,0.14);
    }
    body.ae-mode .messenger-topbar-close {
      color: rgba(180,225,255,0.85);
    }
    body.ae-mode .messenger-topbar-roombtn {
      background: rgba(20, 80, 180, 0.38);
      border: 1px solid rgba(100,190,255,0.22);
      color: rgba(220,245,255,0.97);
    }
    body.ae-mode .messenger-topbar-roombtn:active {
      background: rgba(30,110,230,0.5);
    }

    /* 채팅 본문 배경 */
    body.ae-mode .messenger-body {
      background: transparent;
    }

    /* 날짜 구분선 */
    body.ae-mode .date-separator {
      color: rgba(150,210,255,0.7);
    }
    body.ae-mode .date-separator::before,
    body.ae-mode .date-separator::after {
      background: rgba(100,190,255,0.2);
    }

    /* 말풍선 — 상대방 */
    body.ae-mode .msg-row.other .bubble {
      background: rgba(20, 80, 170, 0.42);
      color: rgba(220,245,255,0.97);
      border: 1px solid rgba(100,190,255,0.18);
      box-shadow: 0 4px 14px rgba(0,40,120,0.2);
    }
    /* 말풍선 — 나 */
    body.ae-mode .msg-row.me .bubble {
      background: rgba(37,99,235,0.75);
      color: #fff;
      border: 1px solid rgba(120,200,255,0.22);
      box-shadow: 0 4px 14px rgba(0,60,180,0.28);
    }
    /* 말풍선 — 캐릭터 자동답변 */
    body.ae-mode .msg-row.char-reply .bubble.char-reply-bubble {
      background: linear-gradient(135deg, rgba(40,160,255,0.28), rgba(20,80,200,0.38));
      color: rgba(200,240,255,0.98);
      border: 1.5px solid rgba(100,190,255,0.38);
    }
    body.ae-mode .msg-row.char-reply .sender-name {
      color: rgba(130,210,255,0.9);
    }
    /* 이모티콘 전용 말풍선 투명 유지 */
    body.ae-mode .bubble.emoji-only,
    body.ae-mode .msg-row.me .bubble.emoji-only,
    body.ae-mode .msg-row.other .bubble.emoji-only {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }
    /* 사진 버블 */
    body.ae-mode .bubble.photo-bubble {
      background: rgba(10,50,120,0.38) !important;
    }
    /* 파일 버블 */
    body.ae-mode .file-bubble {
      background: rgba(10,50,120,0.38) !important;
      color: rgba(220,245,255,0.97) !important;
    }
    body.ae-mode .msg-row.me .file-bubble {
      background: rgba(37,99,235,0.55) !important;
      color: #fff !important;
    }
    body.ae-mode .file-link { color: rgba(130,210,255,0.95) !important; }

    /* 메타(시간) */
    body.ae-mode .msg-meta { color: rgba(150,210,255,0.65); }
    /* 발신자 이름 */
    body.ae-mode .msg-sender-name { color: rgba(130,210,255,0.9); }
    /* 아바타 */
    body.ae-mode .msg-avatar { background: rgba(30,80,180,0.55); }

    /* 빈 방 힌트 */
    body.ae-mode .empty-hint { color: rgba(150,210,255,0.55); }

    /* 입력바 */
    body.ae-mode .messenger-input-bar {
      background: rgba(5, 20, 55, 0.72);
      box-shadow: 0 -1px 0 rgba(100,190,255,0.14);
    }
    body.ae-mode .msg-input-wrap {
      background: rgba(15, 55, 140, 0.45);
      border: 1px solid rgba(100,190,255,0.22);
    }
    body.ae-mode .msg-input {
      color: rgba(220,245,255,0.97);
    }
    body.ae-mode .msg-input::placeholder {
      color: rgba(150,210,255,0.5);
    }
    body.ae-mode .msg-emoji-btn,
    body.ae-mode .msg-camera-btn {
      background: rgba(30,100,220,0.32);
    }
    body.ae-mode .msg-emoji-btn:active,
    body.ae-mode .msg-camera-btn:active {
      background: rgba(40,130,255,0.5);
    }
    body.ae-mode .send-btn {
      background: rgba(37,99,235,0.85);
      box-shadow: 0 6px 18px rgba(0,60,200,0.4);
    }
    body.ae-mode .send-btn:active {
      background: rgba(37,99,235,1);
    }

    /* 이모티콘 패널 */
    body.ae-mode .msg-emoji-panel {
      background: rgba(8,28,64,0.92);
      backdrop-filter: blur(24px) saturate(1.5);
      border: 1px solid rgba(100,190,255,0.2);
      box-shadow: 0 16px 40px rgba(0,40,120,0.35);
    }
    body.ae-mode .emoji-item:active {
      background: rgba(37,99,235,0.3);
    }

    /* 첨부 메뉴 */
    body.ae-mode .msg-attach-menu {
      background: rgba(8,28,64,0.94);
      backdrop-filter: blur(24px) saturate(1.5);
      border: 1px solid rgba(100,190,255,0.2);
      box-shadow: 0 16px 40px rgba(0,40,120,0.35);
    }
    body.ae-mode .msg-attach-item {
      color: rgba(220,245,255,0.97);
    }
    body.ae-mode .msg-attach-item:active {
      background: rgba(37,99,235,0.25);
    }

    /* 대화방 패널(사이드) */
    body.ae-mode .room-panel {
      background: rgba(5,20,55,0.82);
      backdrop-filter: blur(28px) saturate(1.5);
      border-right: 1px solid rgba(100,190,255,0.14);
      box-shadow: 16px 0 36px rgba(0,40,120,0.25);
    }
    body.ae-mode .room-backdrop {
      background: rgba(0,20,60,0.35);
    }
    body.ae-mode .room-panel-header {
      border-bottom: 1px solid rgba(100,190,255,0.14);
    }
    body.ae-mode .room-panel-title {
      color: rgba(200,240,255,0.98);
    }
    body.ae-mode .room-add-btn {
      background: rgba(20,80,180,0.38);
      border: 1px solid rgba(100,190,255,0.2);
      color: rgba(200,240,255,0.9);
    }
    body.ae-mode .room-item {
      background: rgba(15,60,150,0.32);
      border: 1px solid rgba(100,190,255,0.15);
    }
    body.ae-mode .room-item.active {
      background: rgba(30,100,230,0.42);
      border-color: rgba(100,190,255,0.3);
    }
    body.ae-mode .room-item-icon {
      background: rgba(20,80,180,0.5);
    }
    body.ae-mode .room-name {
      color: rgba(220,245,255,0.97);
    }
    body.ae-mode .room-meta {
      color: rgba(150,210,255,0.7);
    }

    /* YouTube 미리보기 */
    body.ae-mode .yt-preview {
      background: rgba(10,50,120,0.42);
      border-color: rgba(100,190,255,0.18);
      color: rgba(220,245,255,0.97);
    }
    body.ae-mode .msg-row.me .yt-preview {
      background: rgba(20,70,180,0.45);
    }
    body.ae-mode .yt-host { color: rgba(150,210,255,0.7); }
    body.ae-mode .yt-thumb { background: rgba(20,60,130,0.5); }

    /* 링크 */
    body.ae-mode .msg-link { color: rgba(130,210,255,0.95); }

    /* 상태 토스트 */
    body.ae-mode .msg-status {
      background: rgba(5,25,65,0.9);
      color: rgba(220,245,255,0.97);
    }
</style>
</head>
<body>
  <div class="messenger-shell">
    <div class="messenger-topbar">
      <button class="messenger-topbar-roombtn" id="topRoomBtn" type="button" aria-expanded="false">전체 대화방</button>
      <div class="messenger-topbar-logo">
        <img src="../images/etcimage/mypai-logo.png" alt="마이파이 로고">
      </div>
      <button class="messenger-topbar-close" id="topCloseBtn" type="button">✕</button>
    </div>
    <div id="roomBackdrop" class="room-backdrop" aria-hidden="true"></div>
    <div class="messenger-main">
      <div class="room-panel" id="roomPanel">
        <div class="room-panel-header">
          <div class="room-panel-title">대화방</div>
          <button id="roomAddBtn" class="room-add-btn" type="button" title="대화방 만들기">＋</button>
        </div>
        <div id="roomList" class="room-list"></div>
      </div>

      <div class="chat-panel">
        <!-- (숨김) 현재 방 정보: 스크립트 호환용 -->
        <div id="roomTitle" style="display:none"></div>
        <div id="roomSub" style="display:none"></div>
<div id="messengerBody" class="messenger-body"></div>
        <div class="messenger-input-bar">
      <div id="msgStatus" class="msg-status"></div>
      <div class="msg-input-wrap">
        <button id="msgEmojiBtn" class="msg-emoji-btn" type="button">😊</button>
        <button id="msgCameraBtn" class="msg-camera-btn" type="button" title="첨부">＋</button>
        <input id="msgInput" class="msg-input" type="text" placeholder="메시지를 입력하세요">
      </div>
      <button id="msgSendBtn" class="send-btn" type="button">보내기</button>
      <div id="msgEmojiPanel" class="msg-emoji-panel"></div>
    </div>
      </div>
    </div>
  </div>

  <!-- 이미지 확대 오버레이 (필요 시만 open) -->
  <div id="imageZoomOverlay" class="img-zoom-overlay" aria-hidden="true">
    <img id="imageZoomImg" alt="확대 이미지">
  <a id="imageZoomOpenLink" class="zoom-open-link" href="#" target="_blank" rel="noopener">원본 열기</a>
</div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/pwa-manager.js"></script>
  <script src="../js/profile-manager.js"></script>
  <script src="../js/fcm-push.js"></script>
  <script src="../js/messenger-press-guard.js"></script>
  <script src="../js/messenger-close-bridge.js"></script>
  <script>window.CHAT_EMOJI_BASE_PATH = "../images/emoticon/";</script>
  <script src="../js/chat-emoji.js"></script>
  <script src="../js/chat-photo.js"></script>
  <script src="../js/chat-file.js"></script>
  <script src="../js/room-unread-badge.js"></script>
  <script src="../js/chat-rooms.js"></script>
  <script src="../js/room-panel-toggle.js"></script>
  <script src="../js/room-guard.js"></script>
  <script src="../js/chat-linkify.js"></script>
  <script src="../js/chat-qr.js"></script>
  <script src="../js/signals.js"></script>
  <script src="../js/room-message-stream.js"></script>
  <script src="../js/social-messenger.js"></script>
  <script>
    /* ── 방송방(ae-mode) postMessage 수신 ── */
    window.addEventListener("message", function(e) {
      if (!e.data || e.data.type !== "ae-mode") return;
      document.body.classList.toggle("ae-mode", !!e.data.active);
    });
  </script>
</body>
</html>
